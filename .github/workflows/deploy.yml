name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # GitHub Pages is static-only: LMS API routes cannot run there.
      # Ship the course UI shell; full auth/exam/admin need a Node host (Vercel/Railway).
      - name: Prepare static-export tree
        run: |
          set -euo pipefail
          # API routes block `output: 'export'`
          if [ -d src/app/api ]; then
            mv src/app/api /tmp/pyarcana-api-backup
          fi
          # Demo/example packages are not part of the product surface and break typecheck
          if [ -d examples ]; then
            mv examples /tmp/pyarcana-examples-backup
          fi
          cat > next.config.ts << 'EOF'
          import type { NextConfig } from "next";

          const nextConfig: NextConfig = {
            output: "export",
            images: { unoptimized: true },
            basePath: "/pyarcana",
            assetPrefix: "/pyarcana/",
            typescript: { ignoreBuildErrors: true },
            reactStrictMode: false,
          };

          export default nextConfig;
          EOF

      - name: Build static export
        run: bunx next build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
